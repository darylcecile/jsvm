name: Auto-format PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Avoid stacking runs on the same PR — cancel any in-flight format job
# when a new push arrives.
concurrency:
  group: auto-format-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  format:
    name: Run oxfmt and commit
    runs-on: ubuntu-latest
    # Fork PRs receive a read-only GITHUB_TOKEN, so the push step would
    # fail with 403. Skip those — contributors from forks must run
    # `bun run format` themselves.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Check out the PR's source branch (not the merge ref) so we can
          # push the formatting commit back to it.
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          # Full history isn't needed; one commit is enough to push on top of.
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run formatter
        run: bun run format

      - name: Commit and push formatting changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No formatting changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: apply oxfmt formatting"
          # Pushes by GITHUB_TOKEN do not trigger further workflow runs,
          # so this won't loop.
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
